<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Content Studio for X</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body class="launcher">
  <h1>Content Studio</h1>
  <p class="subtitle" id="launcherSubtitle">Open workspace to chat with AI</p>

  <button type="button" id="openHalf" class="btn-primary">Half screen</button>
  <button type="button" id="openFull" class="btn-secondary">Large window</button>
  <button type="button" id="openTab" class="btn-secondary">Tab</button>
  <button type="button" id="openSide" class="btn-secondary">Side panel</button>

  <p class="hint" id="launcherHint">Popup is too small for chat — use one of the options above.</p>

  <script src="i18n.js"></script>
  <script src="launcher.js"></script>
</body>
</html>
